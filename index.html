<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harsha's Cinematheque</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f0f;
    --surface:#1a1a1a;
    --surface2:#242424;
    --border:#333;
    --text:#f0f0f0;
    --muted:#999;
    --accent:#e8b86d;
    --accent-dim:#3a2e1a;
    --green:#4caf72;
    --green-dim:#1a2e20;
    --radius:10px;
  }
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;padding:0}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:1.2rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  header h1{font-size:1.3rem;font-weight:500;letter-spacing:0.02em;color:var(--accent)}
  header span{font-size:0.85rem;color:var(--muted)}
  .controls{padding:1.2rem 2rem;display:flex;gap:10px;flex-wrap:wrap;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:64px;z-index:9}
  input,select{height:44px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:0 14px;font-size:0.95rem;outline:none;transition:border-color 0.2s}
  input{flex:1;min-width:220px}
  select{min-width:150px;cursor:pointer}
  input:focus,select:focus{border-color:var(--accent)}
  .lucky{height:44px;padding:0 18px;background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);border-radius:var(--radius);font-size:0.9rem;cursor:pointer;white-space:nowrap;transition:background 0.2s}
  .lucky:hover{background:#4a3a22}
  .stats{padding:0.8rem 2rem;font-size:0.85rem;color:var(--muted)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;padding:0 2rem 2rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color 0.15s,background 0.15s}
  .card:hover,.card:focus{border-color:var(--accent);background:var(--surface2);outline:none}
  .card-title{font-size:0.95rem;font-weight:500;margin-bottom:5px;line-height:1.4;color:var(--text)}
  .card-dir{font-size:0.8rem;color:var(--muted);margin-bottom:10px}
  .tags{display:flex;gap:5px;flex-wrap:wrap}
  .tag{font-size:0.72rem;padding:3px 8px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .tag.sub{background:var(--green-dim);color:var(--green);border-color:#2a5a38}
  .tag.year{color:var(--accent);background:var(--accent-dim);border-color:#4a3a22}
  .empty{text-align:center;padding:4rem 2rem;color:var(--muted);font-size:0.95rem}
  .empty svg{display:block;margin:0 auto 1rem;opacity:0.3}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:2rem;max-width:480px;width:100%;position:relative}
  .modal-close{position:absolute;top:14px;right:14px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;line-height:1}
  .modal-close:hover{color:var(--text)}
  .modal h2{font-size:1.3rem;font-weight:500;margin-bottom:6px;padding-right:2rem;line-height:1.3}
  .modal-meta{font-size:0.85rem;color:var(--muted);margin-bottom:1.5rem}
  .modal-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
  .info-block{background:var(--surface2);border-radius:8px;padding:12px}
  .info-block label{font-size:0.72rem;color:var(--muted);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em}
  .info-block span{font-size:0.9rem;color:var(--text)}
  .watch-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:48px;background:var(--accent);color:#1a1000;border:none;border-radius:var(--radius);font-size:1rem;font-weight:500;cursor:pointer;text-decoration:none;transition:opacity 0.2s}
  .watch-btn:hover{opacity:0.9}

  /* TV-friendly big text mode */
  @media(min-width:1400px){
    .card-title{font-size:1rem}
    .grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
    input,select{height:50px;font-size:1rem}
    .lucky{height:50px}
  }
  @media(max-width:600px){
    .controls{padding:1rem}
    .grid{padding:0 1rem 1rem;grid-template-columns:1fr 1fr}
    header{padding:1rem}
    .stats{padding:0.8rem 1rem}
  }
 /* ---------- Hero Banner ---------- */

.hero{
  margin:24px 2rem;
  padding:48px;
  border-radius:18px;
  background:linear-gradient(135deg,#1b1b1b,#101010);
  border:1px solid #333;
}

.hero-content{
  max-width:700px;
}

.hero-label{
  color:var(--accent);
  font-size:.8rem;
  letter-spacing:.15em;
  margin-bottom:10px;
  font-weight:600;
}

.hero h2{
  font-size:2.5rem;
  margin-bottom:10px;
  font-weight:600;
  line-height:1.2;
}

.hero p{
  color:var(--muted);
  font-size:1rem;
  margin-bottom:24px;
}

.hero-btn{
  background:var(--accent);
  color:#111;
  border:none;
  padding:14px 22px;
  border-radius:10px;
  font-size:1rem;
  font-weight:600;
  cursor:pointer;
  transition:opacity .2s;
}

.hero-btn:hover{
  opacity:.9;
}

@media(max-width:700px){

  .hero{
    margin:1rem;
    padding:24px;
  }

  .hero h2{
    font-size:1.8rem;
  }

}
.stats-banner{
    display:flex;
    gap:24px;
    padding:0 2rem 1.5rem 2rem;
    color:var(--muted);
    font-size:.9rem;
    flex-wrap:wrap;
}

.stats-banner span{
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:8px 14px;
}
</style>
</head>

<header>
 <div>

    <span>World Cinema • Classics • Discover</span>
</div>
  <span id="total-count"></span>
</header>

 <section class="hero" id="hero">
  <div class="hero-content">

</section>

<div class="stats-banner">

    <span id="country-count"></span>
    <span id="director-count"></span>
</div>
 
<div class="controls">
  <input type="text" id="search" placeholder="Search title or director…" autocomplete="off" />
  <select id="country-filter"><option value="">All countries</option></select>
  <select id="decade-filter"><option value="">All decades</option></select>
  <select id="sub-filter">
    <option value="">Any subtitles</option>
    <option value="yes">With subtitles</option>
    <option value="no">No subtitles</option>
  </select>
  <button class="lucky" id="lucky">&#127922; I'm feeling lucky</button>
</div>

<div class="stats" id="stats"></div>
<div class="grid" id="grid"></div>

<div class="overlay" id="overlay">
  <div class="modal" role="dialog" aria-modal="true">
    <button class="modal-close" id="close-modal" aria-label="Close">&#x2715;</button>
    <h2 id="m-title"></h2>
    <div class="modal-meta" id="m-meta"></div>
    <div class="modal-info">
      <div class="info-block"><label>Country</label><span id="m-country"></span></div>

      <div class="info-block"><label>Director</label><span id="m-dir"></span></div>
      <div class="info-block"><label>Subtitles</label><span id="m-subs"></span></div>
    </div>
    <a id="m-link" class="watch-btn" target="_blank" rel="noopener">
      &#9654;&#xFE0E; Watch on Google Drive
    </a>
  </div>
</div>

const movies = MOVIES.map(m => ({title:m[0],year:parseInt(m[1]),country:m[2],director:m[3],subs:m[4],link:m[5]}));

const countries = [...new Set(movies.map(m=>m.country))].sort();
const decades = [...new Set(movies.map(m=>Math.floor(m.year/10)*10))].sort();

document.getElementById('total-count').textContent = movies.length + ' films';

const cf = document.getElementById('country-filter');
const df = document.getElementById('decade-filter');
countries.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cf.appendChild(o);});
decades.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d+'s';df.appendChild(o);});

function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  const country=cf.value, decade=df.value?parseInt(df.value):null, sub=document.getElementById('sub-filter').value;
  return movies.filter(m=>{
    if(q&&!m.title.toLowerCase().includes(q)&&!m.director.toLowerCase().includes(q))return false;
    if(country&&m.country!==country)return false;
    if(decade&&Math.floor(m.year/10)*10!==decade)return false;
    if(sub==='yes'&&m.subs!=='yes')return false;
    if(sub==='no'&&m.subs!=='no')return false;
    return true;
  });
}

function render(){
  const results=filter();
  document.getElementById('stats').textContent = results.length + ' film' + (results.length!==1?'s':'') + ' shown';
  const grid=document.getElementById('grid');
  if(!results.length){
    grid.innerHTML='<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>No films match your filters.</div>';
    return;
  }
  grid.innerHTML = results.map(m=>`
    <div class="card" tabindex="0" role="button" data-title="${m.title.replace(/"/g,'&quot;')}" data-year="${m.year}" data-country="${m.country}" data-dir="${m.director.replace(/"/g,'&quot;')}" data-subs="${m.subs}" data-link="${m.link}">
      <div class="card-title">${m.title}</div>
      <div class="card-dir">${m.director}</div>
      <div class="tags">
        <span class="tag year">${m.year}</span>
        <span class="tag">${m.country}</span>
        ${m.subs==='yes'?'<span class="tag sub">subtitles</span>':''}
      </div>
    </div>`).join('');

  grid.querySelectorAll('.card').forEach(card=>{
    const open=()=>{
      document.getElementById('m-title').textContent=card.dataset.title;
      document.getElementById('m-meta').textContent='';
      document.getElementById('m-country').textContent=card.dataset.country;
      document.getElementById('m-year').textContent=card.dataset.year;
      document.getElementById('m-dir').textContent=card.dataset.dir;
      document.getElementById('m-subs').textContent=card.dataset.subs==='yes'?'Available':'Not available';
      document.getElementById('m-link').href=card.dataset.link;
      document.getElementById('overlay').classList.add('open');
    };
    card.addEventListener('click',open);
    card.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();open();}});
  });
}

document.getElementById('close-modal').addEventListener('click',()=>document.getElementById('overlay').classList.remove('open'));
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))document.getElementById('overlay').classList.remove('open');});
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('overlay').classList.remove('open');});

document.getElementById('search').addEventListener('input',render);
cf.addEventListener('change',render);
df.addEventListener('change',render);
document.getElementById('sub-filter').addEventListener('change',render);
document.getElementById('lucky').addEventListener('click',()=>{
  const r=filter();
  if(!r.length)return;
  const m=r[Math.floor(Math.random()*r.length)];
  document.getElementById('m-title').textContent=m.title;
  document.getElementById('m-country').textContent=m.country;
  document.getElementById('m-year').textContent=m.year;
  document.getElementById('m-dir').textContent=m.director;
  document.getElementById('m-subs').textContent=m.subs==='yes'?'Available':'Not available';
  document.getElementById('m-link').href=m.link;
  document.getElementById('overlay').classList.add('open');
});
