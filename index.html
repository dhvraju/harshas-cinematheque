<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cinema Collection</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0f0f0f;
    --surface:#1a1a1a;
    --surface2:#242424;
    --border:#333;
    --text:#f0f0f0;
    --muted:#888;
    --accent:#e8b86d;
    --accent-dim:#3a2e1a;
    --green:#4caf72;
    --green-dim:#1a2e20;
    --radius:10px;
  }
  body{background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:1.1rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  header h1{font-size:1.25rem;font-weight:500;color:var(--accent)}
  header span{font-size:0.82rem;color:var(--muted)}
  .controls{padding:1rem 2rem;display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;background:var(--bg);border-bottom:1px solid var(--border);position:sticky;top:57px;z-index:9;scrollbar-width:thin}
  input,select{height:42px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:var(--radius);padding:0 12px;font-size:0.88rem;outline:none;transition:border-color 0.2s;flex-shrink:0}
  input{flex:1 1 110px;min-width:90px}
  select{min-width:0;width:auto;max-width:150px;cursor:pointer;text-overflow:ellipsis}
  #director-filter{max-width:170px}
  input:focus,select:focus{border-color:var(--accent)}
  .lucky{height:42px;padding:0 14px;background:var(--accent-dim);border:1px solid var(--accent);color:var(--accent);border-radius:var(--radius);font-size:0.86rem;cursor:pointer;white-space:nowrap;flex-shrink:0}
  .lucky:hover{background:#4a3a22}
  #fav-toggle.active{background:var(--accent);color:#1a1000;border-color:var(--accent)}
  .stats{padding:0.7rem 2rem;font-size:0.82rem;color:var(--muted)}

  /* Grid */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;padding:0 2rem 2rem}

  /* Card */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:border-color 0.15s,transform 0.15s}
  .card:hover,.card:focus{border-color:var(--accent);transform:translateY(-2px);outline:none}
  .poster-wrap{position:relative;aspect-ratio:2/3;background:var(--surface2);overflow:hidden}
  .poster-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;transition:opacity 0.3s;z-index:2}
  .poster-wrap img.loading{opacity:0}
  .poster-wrap img.loaded{opacity:1}
  .poster-placeholder{position:absolute;inset:0;background:var(--surface2);z-index:1}
  .card-info{padding:10px}
  .card-title{font-size:0.82rem;font-weight:500;line-height:1.35;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .card-dir{font-size:0.72rem;color:var(--muted);margin-bottom:7px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tags{display:flex;gap:4px;flex-wrap:wrap}
  .tag{font-size:0.66rem;padding:2px 6px;border-radius:20px;background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
  .tag.sub{background:var(--green-dim);color:var(--green);border-color:#2a5a38}
  .tag.year{color:var(--accent);background:var(--accent-dim);border-color:#4a3a22}
  .empty{text-align:center;padding:4rem 2rem;color:var(--muted);font-size:0.9rem;grid-column:1/-1}

  /* Favourite star */
  .fav-btn{position:absolute;top:6px;right:6px;width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.15);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3;font-size:1rem;line-height:1;transition:background 0.15s,transform 0.1s}
  .rating-badge{position:absolute;bottom:6px;left:6px;background:rgba(0,0,0,0.7);color:var(--accent);font-size:0.72rem;font-weight:600;padding:3px 7px;border-radius:6px;z-index:3;display:flex;align-items:center;gap:3px}
  .rating-badge::before{content:"★";font-size:0.65rem}
  .fav-btn:hover{background:rgba(0,0,0,0.8);transform:scale(1.08)}
  .fav-btn.active{color:var(--accent)}
  .fav-btn svg{width:16px;height:16px}
  .modal-fav-btn{position:absolute;top:10px;left:10px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.6);border:1px solid var(--border);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:3;transition:background 0.15s}
  .modal-fav-btn:hover{background:rgba(0,0,0,0.85)}
  .modal-fav-btn.active{color:var(--accent)}
  .modal-fav-btn svg{width:18px;height:18px}

  /* Modal */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:100;padding:1rem}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;max-width:560px;width:100%;position:relative;overflow:hidden;display:flex;flex-direction:column;max-height:85vh}
  .modal-top{display:flex;gap:0;flex-shrink:0}
  .synopsis-section{padding:1rem 1.4rem 1.4rem;overflow-y:auto;border-top:1px solid var(--border)}
  .synopsis-section label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em;display:block;margin-bottom:6px}
  .synopsis-section p{font-size:0.85rem;line-height:1.55;color:#ddd}
  .synopsis-section a{display:inline-block;margin-top:10px;font-size:0.78rem;color:var(--accent);text-decoration:none}
  .synopsis-section a:hover{text-decoration:underline}
  .modal-poster{width:140px;flex-shrink:0;aspect-ratio:2/3;background:var(--surface2);position:relative;overflow:hidden}
  .modal-poster img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity 0.3s;z-index:2}
  .modal-poster img.loading{opacity:0}
  .modal-poster img.loaded{opacity:1}
  .modal-poster .poster-placeholder{z-index:1}
  .modal-body{flex:1;padding:1.4rem;display:flex;flex-direction:column;gap:12px;min-width:0}
  .modal-close{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.6);border:1px solid var(--border);color:var(--text);border-radius:6px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;z-index:2}
  .modal-close:hover{background:rgba(0,0,0,0.9)}
  .modal h2{font-size:1.1rem;font-weight:500;line-height:1.3}
  .modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .info-block{background:var(--surface2);border-radius:7px;padding:9px 11px}
  .info-block label{font-size:0.65rem;color:var(--muted);display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.05em}
  .info-block span{font-size:0.85rem;color:var(--text)}
  .watch-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:44px;background:var(--accent);color:#1a1000;border:none;border-radius:var(--radius);font-size:0.95rem;font-weight:500;cursor:pointer;text-decoration:none;margin-top:auto}
  .watch-btn:hover{opacity:0.9}

  @media(max-width:600px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(130px,1fr));padding:0 1rem 1rem;gap:10px}
    .controls{padding:0.8rem 1rem}
    header{padding:0.9rem 1rem}
    .stats{padding:0.6rem 1rem}
    .modal-poster{width:110px}
  }
  @media(min-width:1400px){
    .grid{grid-template-columns:repeat(auto-fill,minmax(190px,1fr))}
  }
</style>
</head>

<header>

<script>
// Cache for combined poster + synopsis info, keyed by title+year
const infoCache = {};

// ── Favourites (persisted in localStorage) ─────────────────────────────────
const FAV_KEY = 'cinemaCollectionFavourites';
function loadFavourites(){
  try { return new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]')); }
  catch(e) { return new Set(); }
}
function saveFavourites(set){
  try { localStorage.setItem(FAV_KEY, JSON.stringify([...set])); } catch(e) {}
}
const favourites = loadFavourites();
function favKey(m){ return m.title + m.year; }
function isFavourite(m){ return favourites.has(favKey(m)); }
function toggleFavourite(m){
  const k = favKey(m);
  if(favourites.has(k)) favourites.delete(k); else favourites.add(k);
  saveFavourites(favourites);
}
const starIcon = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>`;
const starIconFilled = `<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.27 5.82 21 7 14.14l-5-4.87 6.91-1.01L12 2z" stroke-width="1" stroke-linejoin="round"/></svg>`;

async function wikiSummary(title) {
  // Wikipedia REST summary endpoint - CORS-enabled, no key needed
  // Returns {poster, synopsis} or null
  try {
    const res = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`, {headers:{'Accept':'application/json'}});
    if (!res.ok) return null;
    const data = await res.json();
    if (data.type === 'disambiguation') return null;
    const poster = (data.thumbnail && data.thumbnail.source)
      ? data.thumbnail.source.replace(/\/\d+px-/, '/500px-')
      : null;
    const synopsis = data.extract || null;
    if (!poster && !synopsis) return null;
    return { poster, synopsis, pageUrl: (data.content_urls && data.content_urls.desktop && data.content_urls.desktop.page) || null };
  } catch(e) { return null; }
}

async function wikiSearchTitle(query) {
  // Use the search API to find the most likely matching page title
  try {
    const res = await fetch(`https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=3`);
    if (!res.ok) return null;
    const data = await res.json();
    const hits = data.query && data.query.search;
    if (!hits || !hits.length) return null;
    return hits[0].title;
  } catch(e) { return null; }
}

async function fetchPoster(title, year) {
  // Backwards-compatible: returns just the poster URL (used by grid thumbnails)
  const info = await fetchFilmInfo(title, year);
  return info ? info.poster : null;
}

async function fetchFilmInfo(title, year) {
  const key = title + year;
  if (infoCache[key] !== undefined) return infoCache[key];

  const promise = (async () => {
    let info = await wikiSummary(`${title} (${year} film)`);
    if (!info) info = await wikiSummary(`${title} (film)`);
    if (!info) info = await wikiSummary(title);
    if (!info) {
      const found = await wikiSearchTitle(`${title} ${year} film`);
      if (found) info = await wikiSummary(found);
    }
    const result = info && (info.poster || info.synopsis) ? info : null;
    infoCache[key] = result;
    return result;
  })();

  infoCache[key] = promise; // temporarily store the in-flight promise
  return promise;
}

function makePlaceholder() {
  return `<div class="poster-placeholder"></div>`;
}

// IntersectionObserver for lazy loading
const observers = new Map();

function lazyLoadPoster(imgEl, searchTitle, year, displayTitle) {
  const obs = new IntersectionObserver(async (entries, o) => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      o.disconnect();
      const info = await fetchFilmInfo(searchTitle, year);
      if (info && info.poster) {
        imgEl.onload = () => imgEl.classList.replace('loading','loaded');
        imgEl.onerror = () => {};
        imgEl.src = info.poster;
        imgEl.alt = displayTitle || searchTitle;
      }
    }
  }, {rootMargin: '200px'});
  obs.observe(imgEl);
}

// Deduplicate by title+year
const seen = new Set();
const movies = MOVIES
  .map(m => ({title:m[0],year:parseInt(m[1]),country:m[2],director:m[3],subs:m[4],link:m[5],rating:(m[6]!=null?parseFloat(m[6]):null),searchTitle:m[7]||m[0]}))
  .filter(m => { const k=m.title+m.year; if(seen.has(k)) return false; seen.add(k); return true; });

document.getElementById('total-count').textContent = movies.length + ' films';

const countries = [...new Set(movies.map(m=>m.country))].sort();
const directors = [...new Set(movies.map(m=>m.director))].sort();
const decades = [...new Set(movies.map(m=>Math.floor(m.year/10)*10))].sort();
const cf = document.getElementById('country-filter');
const dirf = document.getElementById('director-filter');
const df = document.getElementById('decade-filter');
const ratingFilterEl = document.getElementById('rating-filter');
const sortByEl = document.getElementById('sort-by');
const favToggle = document.getElementById('fav-toggle');
let showFavOnly = false;
countries.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;cf.appendChild(o);});
directors.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;dirf.appendChild(o);});
decades.forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d+'s';df.appendChild(o);});

function ratingOf(m){
  return m.rating; // static value loaded directly from the data file
}

function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  const country=cf.value, director=dirf.value, decade=df.value?parseInt(df.value):null, sub=document.getElementById('sub-filter').value;
  const minRating = ratingFilterEl.value ? parseFloat(ratingFilterEl.value) : null;
  let results = movies.filter(m=>{
    if(q&&!m.title.toLowerCase().includes(q)&&!m.director.toLowerCase().includes(q))return false;
    if(country&&m.country!==country)return false;
    if(director&&m.director!==director)return false;
    if(decade&&Math.floor(m.year/10)*10!==decade)return false;
    if(sub==='yes'&&m.subs!=='yes')return false;
    if(sub==='no'&&m.subs!=='no')return false;
    if(showFavOnly&&!isFavourite(m))return false;
    if(minRating!=null){
      const r = ratingOf(m);
      if(r==null||r<minRating)return false; // excludes unloaded/unrated films when threshold is active
    }
    return true;
  });

  const sortMode = sortByEl.value;
  if(sortMode === 'rating-desc' || sortMode === 'rating-asc'){
    results = [...results].sort((a,b) => {
      const ra = ratingOf(a), rb = ratingOf(b);
      const va = (ra==null) ? -1 : ra; // unrated sinks to the bottom in both directions
      const vb = (rb==null) ? -1 : rb;
      return sortMode === 'rating-desc' ? vb - va : va - vb;
    });
  }

  return results;
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function render(){
  const results = filter();
  document.getElementById('stats').textContent = results.length + ' film' + (results.length!==1?'s':'') + ' shown';
  const grid = document.getElementById('grid');

  if(!results.length){
    grid.innerHTML='<div class="empty">No films match your filters.</div>';
    return;
  }

  grid.innerHTML = results.map((m,i) => `
    <div class="card" tabindex="0" role="button" data-idx="${movies.indexOf(m)}">
      <div class="poster-wrap">
        ${makePlaceholder()}
        <img class="loading" data-title="${esc(m.searchTitle)}" data-year="${m.year}" data-display="${esc(m.title)}" alt="" />
        <button class="fav-btn${isFavourite(m)?' active':''}" data-fav-idx="${movies.indexOf(m)}" aria-label="Toggle favourite">${isFavourite(m)?starIconFilled:starIcon}</button>
        ${m.rating!=null?`<span class="rating-badge">${m.rating.toFixed(1)}</span>`:''}
      </div>
      <div class="card-info">
        <div class="card-title" title="${esc(m.title)}">${esc(m.title)}</div>
        <div class="card-dir">${esc(m.director)}</div>
        <div class="tags">
          <span class="tag year">${m.year}</span>
          <span class="tag">${esc(m.country)}</span>
          ${m.subs==='yes'?'<span class="tag sub">subs</span>':''}
        </div>
      </div>
    </div>`).join('');

  // Lazy-load posters
  grid.querySelectorAll('.poster-wrap img[data-title]').forEach(img => {
    lazyLoadPoster(img, img.dataset.title, parseInt(img.dataset.year), img.dataset.display);
  });

  // Favourite star buttons
  grid.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const m = movies[parseInt(btn.dataset.favIdx)];
      toggleFavourite(m);
      const nowFav = isFavourite(m);
      btn.classList.toggle('active', nowFav);
      btn.innerHTML = nowFav ? starIconFilled : starIcon;
      if(showFavOnly && !nowFav) render(); // remove from view if favourites-only mode active
    });
  });

  // Click handlers
  grid.querySelectorAll('.card').forEach(card => {
    const open = () => openModal(movies[parseInt(card.dataset.idx)]);
    card.addEventListener('click', open);
    card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();open();} });
  });
}

function openModal(m){
  document.getElementById('m-title').textContent = m.title;
  document.getElementById('m-country').textContent = m.country;
  document.getElementById('m-year').textContent = m.year;
  document.getElementById('m-dir').textContent = m.director;
  document.getElementById('m-subs').textContent = m.subs==='yes' ? '✓ Available' : 'Not available';
  document.getElementById('m-link').href = m.link;

  // Favourite button state
  const favBtn = document.getElementById('m-fav-btn');
  const setFavBtn = () => {
    const active = isFavourite(m);
    favBtn.classList.toggle('active', active);
    favBtn.innerHTML = active ? starIconFilled : starIcon;
  };
  setFavBtn();
  favBtn.onclick = () => {
    toggleFavourite(m);
    setFavBtn();
    // keep grid in sync if it's currently rendered behind the modal
    const gridBtn = document.querySelector(`.fav-btn[data-fav-idx="${movies.indexOf(m)}"]`);
    if(gridBtn){
      const active = isFavourite(m);
      gridBtn.classList.toggle('active', active);
      gridBtn.innerHTML = active ? starIconFilled : starIcon;
    }
  };

  // Reset modal poster
  const mImg = document.getElementById('m-poster');
  mImg.className = 'loading';
  mImg.src = '';
  mImg.alt = '';
  document.getElementById('m-ph').innerHTML = '';

  // Reset synopsis
  const synEl = document.getElementById('m-synopsis');
  const wikiLink = document.getElementById('m-wiki-link');
  synEl.textContent = 'Loading synopsis…';
  wikiLink.style.display = 'none';

  // Set rating immediately from static data
  const ratingEl = document.getElementById('m-rating');
  ratingEl.textContent = (m.rating != null) ? ('★ ' + m.rating.toFixed(1)) : 'N/A';

  fetchFilmInfo(m.searchTitle, m.year).then(info => {
    if(info && info.poster){
      mImg.onload = () => mImg.classList.replace('loading','loaded');
      mImg.src = info.poster;
      mImg.alt = m.title;
    }
    if(info && info.synopsis){
      synEl.textContent = info.synopsis;
      if(info.pageUrl){
        wikiLink.href = info.pageUrl;
        wikiLink.style.display = 'inline-block';
      }
    } else {
      synEl.textContent = 'No synopsis found on Wikipedia for this film.';
    }
  });

  document.getElementById('overlay').classList.add('open');
}

document.getElementById('close-modal').addEventListener('click', () => document.getElementById('overlay').classList.remove('open'));
document.getElementById('overlay').addEventListener('click', e => { if(e.target===document.getElementById('overlay')) document.getElementById('overlay').classList.remove('open'); });
document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('overlay').classList.remove('open'); });

document.getElementById('search').addEventListener('input', render);

cf.addEventListener('change', render);
dirf.addEventListener('change', render);
df.addEventListener('change', render);
document.getElementById('sub-filter').addEventListener('change', render);
ratingFilterEl.addEventListener('change', render);
sortByEl.addEventListener('change', render);
favToggle.addEventListener('click', () => {
  showFavOnly = !showFavOnly;
  favToggle.classList.toggle('active', showFavOnly);
  favToggle.innerHTML = showFavOnly ? '&#9733; Favourites' : '&#9734; Favourites';
  render();
});

document.getElementById('lucky').addEventListener('click', () => {
  const r = filter();
  if(r.length) openModal(r[Math.floor(Math.random()*r.length)]);
});

render();
</script>
